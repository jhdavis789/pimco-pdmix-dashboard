name: Deploy field site to Pages
# Reliable static deploy via GitHub Actions, replacing the legacy branch-based
# (Jekyll) Pages builder, which intermittently fails during GitHub Pages
# incidents even for a plain static site with .nojekyll. Actions Pages uploads
# the artifact and deploys directly, unaffected by the legacy builder's health.
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
